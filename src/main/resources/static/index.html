<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Financeiro</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

    <!-- LOGIN -->
    <section id="loginBox" class="login-card">
        <h1>💰 Finance AI</h1>
        <p>Entre na sua conta</p>
        <input type="text" id="name" placeholder="Nome">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">
        <button id="loginBtn" onclick="login()">Entrar</button>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard" class="dashboard hidden">
        <h2 id="welcomeMsg"></h2>

        <div class="top">
            <div class="card">
                <h3>Receitas</h3>
                <p id="receitas">R$ 0</p>
            </div>
            <div class="card">
                <h3>Despesas</h3>
                <p id="despesas">R$ 0</p>
            </div>
        </div>

        <div class="charts">
            <div class="card">
                <h3>Fluxo Financeiro</h3>
                <canvas id="barChart"></canvas>
            </div>
            <div class="card">
                <h3>Categorias</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="card table">
            <h3>Transações</h3>
            <table>
                <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Tipo</th>
                    <th>Categoria</th>
                </tr>
                </thead>
                <tbody id="transactionsBody"></tbody>
            </table>
        </div>

        <!-- Botão para abrir modal -->
        <button id="openModalBtn">➕ Adicionar Transação</button>
        <button id="logoutBtn" onclick="logout()">Sair</button>
    </section>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span id="closeModalBtn" class="close">&times;</span>
        <h3>Nova Transação</h3>
        <input type="text" id="descInput" placeholder="Descrição">
        <input type="number" id="amountInput" placeholder="Valor">
        <select id="typeInput">
            <option value="RECEITA">Receita</option>
            <option value="DESPESA">Despesa</option>
        </select>
        <input type="text" id="catInput" placeholder="Categoria">
        <button onclick="addTransaction()">Salvar</button>
        <p id="feedbackMsg"></p>
    </div>
</div>

<!-- Tela de carregamento -->
<div id="loading" class="loading hidden">⏳ Carregando...</div>

<script src="script.js"></script>
</body>
</html>
